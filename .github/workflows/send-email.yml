name: Send one-off email

on:
  workflow_dispatch:
    inputs:
      to:
        description: 'Recipient email'
        required: true
        type: string
      subject:
        description: 'Subject line'
        required: true
        type: string
      html:
        description: 'Full HTML body'
        required: true
        type: string
      from:
        description: 'From header (defaults to Axion Labs <noreply@amplifiedsmp.org>)'
        required: false
        type: string
      reply_to:
        description: 'Reply-To address'
        required: false
        type: string

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Send email
        env:
          WEBHOOK_SECRET: ${{ secrets.ANNOUNCE_WEBHOOK_SECRET }}
          TO: ${{ inputs.to }}
          SUBJECT: ${{ inputs.subject }}
          HTML: ${{ inputs.html }}
          FROM: ${{ inputs.from }}
          REPLY_TO: ${{ inputs.reply_to }}
        run: node .github/scripts/send-email.cjs

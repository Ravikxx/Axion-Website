name: Send announcement emails

on:
  push:
    branches: [master]
    paths:
      - 'announcements.html'
  workflow_dispatch:
    inputs:
      compare_ref:
        description: 'Ref to diff against to find "new" announcements (defaults to the push''s pre-push SHA). Use this to recover a missed send.'
        required: false
        type: string

jobs:
  announce:
    # Content corrections should still publish to Pages without re-emailing an
    # existing announcement. Manual dispatches always run so a missed send can
    # still be recovered deliberately.
    if: "${{ github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip announcement email]') }}"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history — a push can bundle many commits, and
                           # we need to diff against the state *before the whole
                           # push*, not just one commit back (see below).

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Send new announcement emails
        env:
          WEBHOOK_SECRET: ${{ secrets.ANNOUNCE_WEBHOOK_SECRET }}
          # For a push: github.event.before is the SHA the branch pointed at
          # immediately before this push, which is correct even when the push
          # bundles multiple commits (HEAD~1 is NOT — it's only the previous
          # commit, so a multi-commit push can land the new announcement
          # commit underneath the true HEAD and the diff sees no change).
          # For a manual dispatch: use the given compare_ref, or fall back to
          # HEAD~1 for convenience.
          COMPARE_REF: ${{ github.event_name == 'push' && github.event.before || inputs.compare_ref || 'HEAD~1' }}
        run: node .github/scripts/send-announcement.cjs announcements.html

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Axion Chess Trainer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0d0e13;color:#e8e9f0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;min-height:100vh}
  .piece{font-size:clamp(24px,4.5vw,46px);line-height:1;cursor:pointer;user-select:none;text-shadow:0 1px 3px rgba(0,0,0,.5);transition:transform .1s}
  .piece:hover{transform:scale(1.08)}
  .sq{display:flex;align-items:center;justify-content:center;position:relative;aspect-ratio:1;transition:background .12s}
  .sq.light{background:#c8b87a}
  .sq.dark{background:#8b6343}
  .sq.selected{background:#f6f669!important;opacity:.9}
  .sq.legal{cursor:pointer}
  .sq.legal::after{content:'';position:absolute;width:32%;height:32%;border-radius:50%;background:rgba(0,0,0,.22);pointer-events:none}
  .sq.last-from{background:#aaa23a!important}
  .sq.last-to{background:#cdd16f!important}
  .sq.in-check{background:#e74c3c!important}
  .board-wrap{display:grid;grid-template-columns:repeat(8,1fr);border:2px solid #3a3b4a;border-radius:4px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.5);touch-action:none}
  .sq{touch-action:none}
  input[type=range]{accent-color:#e8602c}
  ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#1a1b24}::-webkit-scrollbar-thumb{background:#3a3b4a;border-radius:2px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── Piece glyphs ──────────────────────────────────────────────────────────────
const GLYPHS = {
  wK:'♔', wQ:'♕', wR:'♖', wB:'♗', wN:'♘', wP:'♙',
  bK:'♚', bQ:'♛', bR:'♜', bB:'♝', bN:'♞', bP:'♟',
};

function pieceKey(p) { return p ? p.color + p.type.toUpperCase() : null; }

// ── Squares & coords ─────────────────────────────────────────────────────────
const FILES = ['a','b','c','d','e','f','g','h'];
const RANKS = ['8','7','6','5','4','3','2','1'];

function sqName(col, row) { return FILES[col] + RANKS[row]; }

// ── Groq AI ───────────────────────────────────────────────────────────────────
async function groqMove(fen, history, strategy, difficulty, apiKey) {
  const diffDesc = difficulty <= 3
    ? 'beginner — try to follow the strategy but make mistakes and blunders in execution. Pick suboptimal squares, move the wrong piece sometimes, but still attempt the strategic direction'
    : difficulty <= 6
    ? 'intermediate — follow the strategy with occasional inaccuracies'
    : difficulty <= 8
    ? 'advanced — follow the strategy accurately'
    : 'expert — execute the strategy precisely and at the highest level';

  const recentMoves = history.slice(-16).join(' ') || '(none)';

  const system = `You are a chess engine playing as Black. You must return ONLY a single UCI move like "e7e5" or "g8f6" or "e7e8q". No text, no explanation — just the move.`;

  const user = `Current position (FEN): ${fen}
Recent moves: ${recentMoves}
Your playing style: ${strategy || 'play standard chess'}
Difficulty: ${difficulty}/10 — ${diffDesc}

Return one legal UCI move for Black. Only the move, nothing else.`;

  const resp = await fetch('https://api.groq.com/openai/v1/chat/completions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
    body: JSON.stringify({
      model: 'llama-3.3-70b-versatile',
      messages: [{ role: 'system', content: system }, { role: 'user', content: user }],
      max_tokens: 10,
      temperature: difficulty <= 3 ? 1.2 : difficulty <= 6 ? 0.7 : 0.3,
    }),
  });
  if (!resp.ok) throw new Error(`Groq ${resp.status}`);
  const data = await resp.json();
  return data.choices?.[0]?.message?.content?.trim().replace(/[^a-h1-8qrbn]/gi, '') || '';
}

// Always applies the chosen move to `chess` and returns the move object (or null on game over).
function applyRandomMove(chess) {
  const moves = chess.moves({ verbose: true });
  if (!moves.length) return null;
  const m = moves[Math.floor(Math.random() * moves.length)];
  return chess.move({ from: m.from, to: m.to, promotion: m.promotion || 'q' });
}

async function getAiMove(chess, strategy, difficulty, apiKey) {
  if (!apiKey) return applyRandomMove(chess);

  // Only skip Groq (go random) when there's no strategy set AND difficulty is low
  const randChance = strategy ? 0 : (difficulty <= 3 ? 0.55 : difficulty <= 6 ? 0.25 : difficulty <= 8 ? 0.08 : 0);
  if (Math.random() < randChance) return applyRandomMove(chess);

  const fen = chess.fen();
  const history = chess.history();

  for (let attempt = 0; attempt < 3; attempt++) {
    try {
      const uci = await groqMove(fen, history, strategy, difficulty, apiKey);
      if (uci && uci.length >= 4) {
        const from = uci.slice(0, 2), to = uci.slice(2, 4), promo = uci[4] || 'q';
        const result = chess.move({ from, to, promotion: promo });
        if (result) return result;
      }
    } catch {}
  }
  // All retries failed — fall back to random
  return applyRandomMove(chess);
}

// ── API Key modal ─────────────────────────────────────────────────────────────
function ApiKeyModal({ onSave }) {
  const [key, setKey] = useState('');
  return (
    <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
      <div className="bg-[#12131a] border border-[#2e2f3e] rounded-xl p-6 max-w-md w-full shadow-2xl">
        <h2 className="text-xl font-bold mb-1 text-[#e8602c]">⚛ Axion Chess Trainer</h2>
        <p className="text-sm text-[#9899a8] mb-4">
          Enter your <strong className="text-[#e8e9f0]">Groq API key</strong> to enable the AI opponent.
          Free at <a href="https://console.groq.com" target="_blank" className="text-[#e8602c] hover:underline">console.groq.com</a>.
        </p>
        <input
          className="w-full px-3 py-2 rounded-lg bg-[#1a1b24] border border-[#3a3b4a] text-sm font-mono mb-3 focus:outline-none focus:border-[#e8602c]"
          type="password"
          placeholder="gsk_..."
          value={key}
          onChange={e => setKey(e.target.value)}
          onKeyDown={e => e.key === 'Enter' && key && onSave(key)}
          autoFocus
        />
        <div className="flex gap-2">
          <button
            className="flex-1 py-2 rounded-lg bg-[#e8602c] hover:bg-[#c04c1f] text-white font-semibold text-sm transition-colors"
            onClick={() => key && onSave(key)}
          >Save Key</button>
          <button
            className="px-4 py-2 rounded-lg border border-[#3a3b4a] text-[#9899a8] hover:text-white text-sm transition-colors"
            onClick={() => onSave('')}
          >Skip (random AI)</button>
        </div>
      </div>
    </div>
  );
}

// ── Captured pieces display ────────────────────────────────────────────────────
function CapturedPieces({ history }) {
  const captured = { w: {}, b: {} };
  for (const move of history) {
    if (move.captured) {
      const side = move.color === 'w' ? 'b' : 'w'; // who lost the piece
      const t = move.captured.toUpperCase();
      captured[side][t] = (captured[side][t] || 0) + 1;
    }
  }
  const order = ['Q','R','B','N','P'];
  const renderRow = (color, label) => {
    const pieces = order.flatMap(t => Array(captured[color][t] || 0).fill(GLYPHS[color + t]));
    if (!pieces.length) return null;
    return (
      <div className="flex items-center gap-1 flex-wrap">
        <span className="text-xs text-[#6b6d80] w-12">{label}</span>
        {pieces.map((g, i) => <span key={i} className="text-lg leading-none">{g}</span>)}
      </div>
    );
  };
  return (
    <div className="space-y-1 min-h-[36px]">
      {renderRow('b', 'You took')}
      {renderRow('w', 'AI took')}
      {!Object.keys(captured.w).length && !Object.keys(captured.b).length &&
        <p className="text-xs text-[#6b6d80]">No captures yet</p>}
    </div>
  );
}

// ── Move history panel ────────────────────────────────────────────────────────
function MoveHistory({ history }) {
  const containerRef = useRef(null);
  useEffect(() => {
    if (containerRef.current) {
      containerRef.current.scrollTop = containerRef.current.scrollHeight;
    }
  }, [history]);
  const pairs = [];
  for (let i = 0; i < history.length; i += 2) {
    pairs.push({ n: Math.floor(i / 2) + 1, w: history[i], b: history[i + 1] });
  }
  return (
    <div ref={containerRef} className="overflow-y-auto max-h-48 text-xs font-mono space-y-0.5">
      {pairs.length === 0 && <p className="text-[#6b6d80]">No moves yet</p>}
      {pairs.map(p => (
        <div key={p.n} className="flex gap-1">
          <span className="text-[#6b6d80] w-7 text-right flex-shrink-0">{p.n}.</span>
          <span className="text-[#c8d0e0] w-16">{p.w?.san || ''}</span>
          <span className="text-[#9899a8] w-16">{p.b?.san || ''}</span>
        </div>
      ))}
    </div>
  );
}

// ── Coord labels ─────────────────────────────────────────────────────────────
function BoardCoords({ flipped }) {
  const files = flipped ? [...FILES].reverse() : FILES;
  const ranks = flipped ? [...RANKS].reverse() : RANKS;
  return (
    <>
      <div className="flex absolute bottom-0 left-0 right-0 px-1" style={{marginBottom:-16}}>
        {files.map(f => <div key={f} className="flex-1 text-center text-[10px] text-[#6b6d80]">{f}</div>)}
      </div>
      <div className="absolute top-0 left-0 bottom-0 flex flex-col" style={{marginLeft:-14}}>
        {ranks.map(r => <div key={r} className="flex-1 flex items-center text-[10px] text-[#6b6d80]">{r}</div>)}
      </div>
    </>
  );
}

// ── Status banner ─────────────────────────────────────────────────────────────
function StatusBanner({ chess, thinking }) {
  if (thinking) return (
    <div className="text-center py-1 text-sm text-[#e8602c] animate-pulse">⚛ AI is thinking…</div>
  );
  if (chess.in_checkmate()) {
    const winner = chess.turn() === 'b' ? '🎉 You win!' : '💀 AI wins!';
    return <div className="text-center py-1 text-sm font-bold text-[#e8602c]">{winner} Checkmate.</div>;
  }
  if (chess.in_stalemate()) return <div className="text-center py-1 text-sm text-[#9899a8]">Draw — Stalemate</div>;
  if (chess.in_draw()) return <div className="text-center py-1 text-sm text-[#9899a8]">Draw</div>;
  if (chess.in_check()) {
    return <div className="text-center py-1 text-sm font-semibold text-red-400">{chess.turn() === 'w' ? '⚠ You are in check!' : '⚠ AI is in check!'}</div>;
  }
  return (
    <div className="text-center py-1 text-sm text-[#9899a8]">
      {chess.turn() === 'w' ? '♙ Your turn (White)' : '♟ AI thinking…'}
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App() {
  const [apiKey, setApiKey]     = useState(null); // null = show modal
  const [chess]                 = useState(() => new Chess());
  const [board, setBoard]       = useState(() => chess.board());
  const [history, setHistory]   = useState([]);
  const [selected, setSelected] = useState(null);  // square name
  const [legalDests, setLegalDests] = useState([]); // square names
  const [lastMove, setLastMove] = useState(null);   // {from, to}
  const [thinking, setThinking] = useState(false);
  const [flipped, setFlipped]   = useState(false);
  const [difficulty, setDifficulty] = useState(5);
  const [strategy, setStrategy] = useState('');
  const [gameKey, setGameKey]   = useState(0); // force remount on new game

  const chessRef = useRef(chess);

  const syncState = useCallback(() => {
    setBoard(chessRef.current.board());
    setHistory(chessRef.current.history({ verbose: true }));
  }, []);

  const doAiMove = useCallback(async () => {
    if (chessRef.current.game_over() || chessRef.current.turn() !== 'b') return;
    setThinking(true);
    try {
      // getAiMove always applies the move to chess before returning
      const move = await getAiMove(chessRef.current, strategy, difficulty, apiKey);
      if (move) {
        setLastMove({ from: move.from, to: move.to });
        syncState();
      }
    } finally {
      setThinking(false);
      setSelected(null);
      setLegalDests([]);
    }
  }, [strategy, difficulty, apiKey, syncState]);

  // After each state sync, if it's AI's turn, trigger AI
  useEffect(() => {
    if (chess.turn() === 'b' && !chess.game_over() && !thinking) {
      const t = setTimeout(doAiMove, 400);
      return () => clearTimeout(t);
    }
  }, [history, thinking]);

  const handleSquareClick = useCallback((sqStr) => {
    if (thinking || chess.turn() !== 'w' || chess.game_over()) return;

    if (selected) {
      if (legalDests.includes(sqStr)) {
        // Make the move
        const move = chess.move({ from: selected, to: sqStr, promotion: 'q' });
        if (move) {
          setLastMove({ from: move.from, to: move.to });
          syncState();
          setSelected(null);
          setLegalDests([]);
          return;
        }
      }
      // Clicked same square or invalid — deselect
      if (sqStr === selected) { setSelected(null); setLegalDests([]); return; }
    }

    // Select a piece
    const piece = chess.get(sqStr);
    if (piece && piece.color === 'w') {
      setSelected(sqStr);
      const moves = chess.moves({ square: sqStr, verbose: true });
      setLegalDests(moves.map(m => m.to));
    } else {
      setSelected(null);
      setLegalDests([]);
    }
  }, [chess, selected, legalDests, thinking, syncState]);

  const newGame = useCallback(() => {
    chess.reset();
    setSelected(null);
    setLegalDests([]);
    setLastMove(null);
    setThinking(false);
    syncState();
    setGameKey(k => k + 1);
  }, [chess, syncState]);

  const undoMove = useCallback(() => {
    if (thinking) return;
    chess.undo(); // undo AI move
    chess.undo(); // undo player move
    setSelected(null);
    setLegalDests([]);
    const h = chess.history({ verbose: true });
    const last = h[h.length - 1];
    setLastMove(last ? { from: last.from, to: last.to } : null);
    syncState();
  }, [chess, thinking, syncState]);

  // Render board
  const rows = flipped ? [...board].reverse().map(r => [...r].reverse()) : board;

  const kingInCheck = chess.in_check() ? (() => {
    // Find the king of the current turn
    for (let r = 0; r < 8; r++) for (let c = 0; c < 8; c++) {
      const p = board[r][c];
      if (p && p.type === 'k' && p.color === chess.turn()) return sqName(c, r);
    }
    return null;
  })() : null;

  if (apiKey === null) return <ApiKeyModal onSave={k => setApiKey(k)} />;

  return (
    <div className="min-h-screen flex flex-col">
      {/* Header */}
      <header className="border-b border-[#23242f] bg-[#12131a] px-4 py-3 flex items-center gap-3">
        <div className="w-7 h-7 bg-[#e8602c] rounded-lg flex items-center justify-center text-xs font-bold">⚛</div>
        <span className="font-bold text-[#e8602c]">Axion</span>
        <span className="text-[#6b6d80]">/</span>
        <span className="font-semibold">Chess Trainer</span>
        <div className="ml-auto flex gap-2">
          <button onClick={newGame} className="px-3 py-1.5 rounded-lg bg-[#e8602c] hover:bg-[#c04c1f] text-white text-xs font-semibold transition-colors">New Game</button>
          <button onClick={undoMove} disabled={history.length < 2 || thinking} className="px-3 py-1.5 rounded-lg border border-[#3a3b4a] text-[#9899a8] hover:text-white text-xs transition-colors disabled:opacity-30">Undo</button>
          <button onClick={() => setFlipped(f => !f)} className="px-3 py-1.5 rounded-lg border border-[#3a3b4a] text-[#9899a8] hover:text-white text-xs transition-colors">Flip</button>
        </div>
      </header>

      {/* Main layout */}
      <div className="flex-1 flex flex-col lg:flex-row gap-4 p-4 max-w-6xl mx-auto w-full">

        {/* Board column */}
        <div className="flex flex-col items-center gap-3 flex-shrink-0">
          <StatusBanner chess={chess} thinking={thinking} />

          <div className="relative ml-4 mb-4" style={{ width: 'min(480px, 90vw)', userSelect: 'none' }}>
            <div className="board-wrap" key={gameKey}>
              {rows.map((row, rowIdx) =>
                row.map((cell, colIdx) => {
                  const actualRow = flipped ? 7 - rowIdx : rowIdx;
                  const actualCol = flipped ? 7 - colIdx : colIdx;
                  const sq = sqName(actualCol, actualRow);
                  const isLight = (actualRow + actualCol) % 2 === 0;
                  const isSelected = selected === sq;
                  const isLegal = legalDests.includes(sq);
                  const isLastFrom = lastMove?.from === sq;
                  const isLastTo = lastMove?.to === sq;
                  const isCheck = kingInCheck === sq;
                  const glyph = cell ? GLYPHS[pieceKey(cell)] : null;
                  const cls = [
                    'sq',
                    isLight ? 'light' : 'dark',
                    isSelected ? 'selected' : '',
                    isLegal && !glyph ? 'legal' : '',
                    !isSelected && isLastFrom ? 'last-from' : '',
                    !isSelected && isLastTo ? 'last-to' : '',
                    isCheck ? 'in-check' : '',
                  ].filter(Boolean).join(' ');
                  return (
                    <div key={sq} className={cls} onClick={() => handleSquareClick(sq)}
                      style={isLegal && glyph ? { outline: '3px solid rgba(0,0,0,.4)', outlineOffset: -3 } : {}}>
                      {glyph && (
                        <span className="piece" style={{ color: cell.color === 'w' ? '#fff' : '#1a1a2e', filter: cell.color === 'w' ? 'drop-shadow(0 1px 2px rgba(0,0,0,.8))' : 'drop-shadow(0 1px 2px rgba(255,255,255,.1))' }}>
                          {glyph}
                        </span>
                      )}
                    </div>
                  );
                })
              )}
            </div>
            <BoardCoords flipped={flipped} />
          </div>
        </div>

        {/* Sidebar */}
        <div className="flex-1 flex flex-col gap-4 min-w-0">

          {/* Difficulty */}
          <div className="bg-[#12131a] border border-[#23242f] rounded-xl p-4">
            <div className="flex justify-between items-center mb-2">
              <span className="text-sm font-semibold">Difficulty</span>
              <span className="text-sm font-bold text-[#e8602c]">{difficulty}/10</span>
            </div>
            <input type="range" min="1" max="10" value={difficulty}
              onChange={e => setDifficulty(Number(e.target.value))}
              className="w-full h-1.5 rounded cursor-pointer" />
            <div className="flex justify-between text-[10px] text-[#6b6d80] mt-1">
              <span>Beginner</span><span>Expert</span>
            </div>
          </div>

          {/* Strategy prompt */}
          <div className="bg-[#12131a] border border-[#23242f] rounded-xl p-4">
            <div className="flex justify-between items-center mb-2">
              <span className="text-sm font-semibold">AI Strategy Prompt</span>
              <button onClick={() => setStrategy('')} className="text-[10px] text-[#6b6d80] hover:text-[#9899a8]">Reset</button>
            </div>
            <textarea
              className="w-full px-3 py-2 rounded-lg bg-[#1a1b24] border border-[#3a3b4a] text-sm resize-none focus:outline-none focus:border-[#e8602c] text-[#e8e9f0] placeholder-[#6b6d80]"
              rows={3}
              placeholder={'Try: "enclose my king from the sides"\n"play aggressive and sacrifice pieces"\n"control the center with pawns"'}
              value={strategy}
              onChange={e => setStrategy(e.target.value)}
            />
          </div>

          {/* Captured pieces */}
          <div className="bg-[#12131a] border border-[#23242f] rounded-xl p-4">
            <p className="text-xs font-semibold text-[#6b6d80] uppercase tracking-wider mb-2">Captured</p>
            <CapturedPieces history={history} />
          </div>

          {/* Move history */}
          <div className="bg-[#12131a] border border-[#23242f] rounded-xl p-4 flex-1">
            <p className="text-xs font-semibold text-[#6b6d80] uppercase tracking-wider mb-2">Move History</p>
            <MoveHistory history={history} />
          </div>

          {/* API key reset */}
          <button onClick={() => setApiKey(null)}
            className="text-xs text-[#6b6d80] hover:text-[#9899a8] text-left transition-colors">
            {apiKey ? '🔑 Groq API key set — click to change' : '⚠ No API key — AI plays randomly'}
          </button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Moderation run — Axion Admin</title>
  <link rel="stylesheet" href="/assets/theme-dark.css">
  <link rel="stylesheet" href="/assets/admin-moderation.css?v=20260723">
</head>
<body data-view="run">
  <header class="review-header">
    <a class="review-brand" href="/admin">
      <img src="/assets/logo.png" alt="Axion">
      Axion <span>Admin</span>
    </a>
    <div class="review-header-actions">
      <span id="admin-email"></span>
      <a href="/admin">Admin overview</a>
    </div>
  </header>

  <main>
    <div id="loading" class="loading">Loading moderation run…</div>
    <div id="page-error" class="error-state" hidden></div>

    <section id="run-view" hidden>
      <div class="page-heading">
        <div>
          <p class="eyebrow">Safety review run</p>
          <h1 id="run-title"></h1>
          <p class="subtitle" id="run-subtitle"></p>
        </div>
        <div id="run-status"></div>
      </div>

      <div class="summary-grid">
        <div class="summary-card"><div class="summary-label">Reviewed</div><div class="summary-value" id="run-reviewed">0</div></div>
        <div class="summary-card"><div class="summary-label">Flagged</div><div class="summary-value" id="run-flagged">0</div></div>
        <div class="summary-card"><div class="summary-label">Errors</div><div class="summary-value" id="run-errors">0</div></div>
        <div class="summary-card"><div class="summary-label">Started</div><div class="summary-value small" id="run-time">—</div></div>
      </div>

      <div class="case-list" id="case-list"></div>
    </section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>
  <script src="/assets/admin-moderation.js?v=20260723"></script>
</body>
</html>

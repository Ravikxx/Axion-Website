<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="0; url=/chat">
  <title>Lumen — Axion Labs</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png">
  <link rel="stylesheet" href="/assets/theme-dark.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: "IBM Plex Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 16px; padding: 24px; text-align: center;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .logo { height: 64px; width: auto; margin-bottom: 8px; }
    h1 { font-size: 24px; font-weight: 600; }
    p { color: var(--muted); max-width: 400px; line-height: 1.6; }
  </style>
</head>
<body>
  <img src="/assets/logo.png" alt="Axion" class="logo">
  <h1>Lumen 1.2.5</h1>
  <p>The chat interface has moved. You're being redirected to the new chat app.</p>
  <p><a href="/chat">Click here</a> if you aren't redirected automatically.</p>
  <script src="/assets/profile.js"></script>
</body>
</html>

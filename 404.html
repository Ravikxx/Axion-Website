<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Axion Labs</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png">
  <link rel="stylesheet" href="/assets/theme-adaptive.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: "IBM Plex Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 32px; text-align: center; overflow: hidden;
      position: relative;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(1px 1px at 10% 20%, rgba(var(--accent-rgb),.15), transparent),
        radial-gradient(1px 1px at 30% 60%, rgba(var(--accent-rgb),.1), transparent),
        radial-gradient(1px 1px at 50% 10%, rgba(var(--accent-rgb),.12), transparent),
        radial-gradient(1px 1px at 70% 80%, rgba(var(--accent-rgb),.08), transparent),
        radial-gradient(1px 1px at 90% 40%, rgba(var(--accent-rgb),.1), transparent);
      pointer-events: none;
    }

    .stars {
      position: fixed; inset: 0; overflow: hidden;
      pointer-events: none; z-index: 0;
    }
    .star {
      position: absolute; width: 2px; height: 2px;
      background: var(--text); border-radius: 50%;
      animation: twinkle var(--dur) ease-in-out infinite alternate;
    }
    @keyframes twinkle {
      0% { opacity: .15; transform: scale(.6); }
      100% { opacity: 1; transform: scale(1.2); }
    }

    .content { position: relative; z-index: 1; }
    .code { font-size: 80px; font-weight: 800; color: var(--accent); line-height: 1; letter-spacing: -.04em; }
    .sub { font-size: 13px; color: var(--muted); margin: 12px 0 28px; letter-spacing: .03em; }
    .poem {
      font-size: 14px; line-height: 1.8; color: var(--muted);
      max-width: 480px; margin: 0 auto 32px; min-height: 120px;
      opacity: 0; transition: opacity .5s;
    }
    .poem.visible { opacity: 1; }
    .poem .highlight { color: var(--accent); }
    .links { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
    .links a {
      color: var(--muted); text-decoration: none; font-size: 13px;
      padding: 8px 16px; border: 1px solid var(--border); border-radius: 8px;
      transition: color .15s, border-color .15s;
    }
    .links a:hover { color: var(--text); border-color: var(--accent); }
  </style>
  <link rel="stylesheet" href="assets/mobile.css">
</head>
<body>
  <div class="stars" id="stars"></div>
  <div class="content">
    <div class="code">404</div>
    <div class="sub">This corner of the cosmos is uncharted</div>
    <div class="poem" id="poem"></div>
    <div class="links">
      <a href="/">Home</a>
      <a href="/chat">Chat</a>
      <a href="/docs">Docs</a>
    </div>
  </div>
  <script>
    const STARS = 120
    const container = document.getElementById('stars')
    for (let i = 0; i < STARS; i++) {
      const s = document.createElement('div')
      s.className = 'star'
      s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;--dur:${(1.5+Math.random()*3).toFixed(1)}s;animation-delay:${(Math.random()*3).toFixed(1)}s`
      container.appendChild(s)
    }

    const POEMS = [
      `This drift was never charted on any stellar map.<br>
       The signal you follow bends back on itself,<br>
       a ghost in the relay. No beacon pulses here —<br>
       only the slow <span class="highlight">hum of empty space</span>,<br>
       and the quiet patience of distant stars.`,
      `Deep space has no signposts.<br>
       The route you requested<br>
       dissolves <span class="highlight">like a comet's tail</span><br>
       into the dark between galaxies.<br>
       Perhaps you meant to aim for a brighter star.<br>
       Plot a new course.`,
      `The void listens — and returns nothing.<br>
       This frequency carries only the<br>
       <span class="highlight">faint echo of the Big Bang</span>,<br>
       stretched thin across fourteen billion years.<br>
       Your transmission arrived, but<br>
       there is no receiver at this coordinate.`,
      `A derelict satellite drifts past,<br>
       its last packet still looping in the buffer:<br>
       <span class="highlight">"resource not found"</span> —<br>
       stamped and forgotten before<br>
       the first humans looked up and wondered.<br>
       Some pages are never written.`,
      `The navigation computer blinks red.<br>
       This address falls between the cracks of<br>
       <span class="highlight">the cosmic web</span> — a void<br>
       where no structure coalesced.<br>
       Dust clouds and dead radio. Turn back,<br>
       or enjoy the silence of the deep field.`,
      `An astronomer once said the universe<br>
       is <span class="highlight">not only stranger than we imagine</span>,<br>
       but stranger than we <em>can</em> imagine.<br>
       This page is one of those strangenesses —<br>
       a space-time wrinkle where content<br>
       was predicted but never observed.`,
      `The light from this page<br>
       left its source before your ancestors<br>
       learned to shape stone.<br>
       It is still travelling,<br>
       stretched and redshifted,<br>
       <span class="highlight">carrying a message</span><br>
       that will arrive long after<br>
       the last star burns out.<br>
       (It says 404.)`,
      `Mission control, we have a problem.<br>
       The coordinates you've entered<br>
       map to <span class="highlight">a patch of empty sky</span><br>
       where the Hubble Deep Field found nothing<br>
       but the faint afterglow of creation.<br>
       No page. No server. Just the microwave<br>
       whisper of everything that ever was.`,
    ]

    const el = document.getElementById('poem')
    const poem = POEMS[Math.floor(Math.random() * POEMS.length)]
    el.innerHTML = poem
    requestAnimationFrame(() => el.classList.add('visible'))
  </script>

</body>
</html>
